name: Publish

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # OIDC trusted publishing requires npm >= 11.5.1, but Node 22 ships with 10.x.
      - run: npm install -g npm@latest

      - run: bun install

      - run: bun run build

      # bun pack resolves workspace deps and peer deps cleanly, producing a .tgz.
      - name: Pack with bun
        run: bun pm pack

      - name: Publish to npm (OIDC provenance)
        run: |
          TARBALL=$(ls *.tgz | head -1)
          npm publish "$TARBALL" --provenance --access public