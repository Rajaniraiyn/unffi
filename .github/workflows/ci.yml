name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.runtime }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runtime: bun, os: ubuntu-latest }
          - { runtime: deno, os: ubuntu-latest }
          - { runtime: node, os: ubuntu-latest }

    steps:
      - uses: actions/checkout@v4

      # Every runtime needs bun for install + build (tsgo via @typescript/native-preview).
      - uses: oven-sh/setup-bun@v2

      - if: matrix.runtime == 'deno'
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - if: matrix.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: bun install

      - run: bun run build

      # --- bun ---
      - if: matrix.runtime == 'bun'
        run: cc -shared -fPIC -o /tmp/unffi_math.so tests/fixtures/math.c

      - if: matrix.runtime == 'bun'
        run: bun test tests/ffi.test.ts

      # --- deno ---
      # Full Deno runtime tests need a Deno-specific test harness (ffi.test.ts uses bun:test).
      # Have Deno check the emitted output to verify it's consumable by Deno users.
      - if: matrix.runtime == 'deno'
        run: deno check dist/adapters/deno.js

      # --- node ---
      # Full Node runtime tests need a Node test harness (ffi.test.ts uses bun:test).
      # Build above already validates the Node target via tsconfig.node.json.
