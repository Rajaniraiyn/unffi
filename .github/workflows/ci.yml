name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: bun,              runtime: bun,  os: ubuntu-latest }
          - { name: deno,             runtime: deno, os: ubuntu-latest }
          - { name: node-22-koffi,    runtime: node, os: ubuntu-latest, node-version: '22' }
          - { name: node-26-native,   runtime: node, os: ubuntu-latest, node-version: '26', ffi_flag: '--experimental-ffi' }

    steps:
      - uses: actions/checkout@v4

      # Every runtime needs bun for install + build (tsgo via @typescript/native-preview).
      - uses: oven-sh/setup-bun@v2

      - if: matrix.runtime == 'deno'
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - if: matrix.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - run: bun install

      - run: bun run build

      # --- bun ---
      - if: matrix.runtime == 'bun'
        run: cc -shared -fPIC -o /tmp/unffi_math.so tests/fixtures/math.c

      - if: matrix.runtime == 'bun'
        run: bun test tests/ffi.test.ts

      # --- deno ---
      # Full Deno runtime tests need a Deno-specific test harness (ffi.test.ts uses bun:test).
      # Have Deno check the emitted output to verify it's consumable by Deno users.
      - if: matrix.runtime == 'deno'
        run: deno check dist/adapters/deno.js

      # --- node (koffi fallback & native node:ffi) ---
      - if: matrix.runtime == 'node'
        run: cc -shared -fPIC -o /tmp/unffi_math.so tests/fixtures/math.c

      # Run a focused inline test using the compiled dist output (avoids bun:ffi / bun:test imports).
      # Use --input-type=module so top-level await and await using work on Node 22+.
      - if: matrix.runtime == 'node'
        run: |
          node ${{ matrix.ffi_flag }} --input-type=module -e "
          import { dlopen, t } from './dist/adapters/node.js';
          import assert from 'assert';

          const ext = process.platform === 'darwin' ? 'dylib' : 'so';

          // --- core types ---
          await using lib = dlopen('/tmp/unffi_math.' + ext, {
            add_i32: { args: [t.i32,  t.i32  ], returns: t.i32     },
            add_i64: { args: [t.i64,  t.i64  ], returns: t.i64     },
            add_f64: { args: [t.f64,  t.f64  ], returns: t.f64     },
            gt_i32:  { args: [t.i32,  t.i32  ], returns: t.bool    },
            greet:   { args: [t.cstring       ], returns: t.cstring },
            noop:    { args: [                 ], returns: t.void   },
            sum_i32: { args: [t.buffer, t.i32 ], returns: t.i32    },
          });

          assert.strictEqual(lib.symbols.add_i32(10, 20), 30);
          assert.strictEqual(lib.symbols.add_i64(1n, 2n), 3n);
          assert.strictEqual(lib.symbols.add_f64(1.5, 2.5), 4.0);
          assert.strictEqual(lib.symbols.gt_i32(5, 3), true);
          assert.strictEqual(lib.symbols.gt_i32(3, 5), false);
          assert.strictEqual(lib.symbols.greet('World'), 'Hello, World');
          assert.strictEqual(lib.symbols.noop(), undefined);

          const arr = new Int32Array([1, 2, 3, 4, 5]);
          assert.strictEqual(lib.symbols.sum_i32(arr, arr.length), 15);

          // --- callbacks ---
          await using lib2 = dlopen('/tmp/unffi_math.' + ext, {
            apply:       { args: [t.fn([t.i32], t.i32), t.i32], returns: t.i32 },
            with_message: { args: [t.fn([t.cstring], t.void), t.cstring], returns: t.void },
          });
          assert.strictEqual(lib2.symbols.apply((x) => x * 2, 5), 10);
          let received = null;
          lib2.symbols.with_message((msg) => { received = msg; }, 'hello');
          assert.strictEqual(received, 'hello');

          console.log('OK');
          " 2>&1
