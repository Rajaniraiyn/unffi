name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      # Install from workspace root so docs/ workspace deps are resolved.
      - run: bun install

      # Build root unffi package first — docs use twoslash code samples that
      # `import from 'unffi'`, which needs dist/*.d.ts to exist.
      - run: bun run build

      # Re-run install so bun refreshes its snapshot of the `unffi` file:
      # dep (docs/package.json has `"unffi": "../."`). The initial install
      # snapshotted the source dir before dist/ existed.
      - run: bun install

      - run: bun run --cwd docs build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/out

      - id: deploy
        uses: actions/deploy-pages@v4
