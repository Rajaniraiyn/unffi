name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      # Build root unffi package — docs twoslash code samples may import 'unffi'.
      - run: bun run build

      # Re-install so bun refreshes its file: snapshot of unffi with dist/.
      - run: bun install

      - run: bun run --cwd docs build
        env:
          NODE_ENV: production

      # GitHub Pages serves the docs/out static export. Disable Jekyll so
      # paths starting with _ (Next's _next/) are served.
      - run: touch docs/out/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/out

      - id: deploy
        uses: actions/deploy-pages@v4
