changelog:
  exclude:
    labels: [skip-changelog, dependencies]
  categories:
    - title: Breaking Changes
      labels: [breaking]
    - title: New Features
      labels: [feature, enhancement]
    - title: Bug Fixes
      labels: [bug, fix]
    - title: Performance
      labels: [perf, performance]
    - title: Internal
      labels: [chore, refactor, docs, ci]
